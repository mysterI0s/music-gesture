# Music Gesture - default configuration
# Values follow the CVPR 2020 paper where specified; the rest are reasonable defaults.

experiment:
  name: music_gesture_music21
  seed: 1234
  output_dir: runs

data:
  root: datasets/processed
  train_index: datasets/processed/train.csv
  val_index: datasets/processed/val.csv
  num_mix: 2                # N in Mix-and-Separate (paper trains with 2)
  categories: 21            # MUSIC-21
  mix_policy: random        # {random, hetero, homo} partner-selection for mixing

audio:
  sample_rate: 11025
  clip_seconds: 6.0
  n_fft: 1022
  hop_length: 256
  win_length: 1022
  n_freq: 512               # STFT freq bins (n_fft/2)
  log_freq: true            # warp to log-frequency scale
  n_log_freq: 256
  mask_type: binary         # {binary, ratio} - MG uses a binary IBM + per-pixel BCE
  mask_target: dominant     # {dominant, literal_mix} binary-mask target (paper Eq.4 = literal_mix)
  loss_mode: bce_energy_weighted  # {bce_energy_weighted, bce_plain} (paper = bce_plain)
  mask_threshold: 0.7       # inference threshold to binarise the predicted mask (paper)
  loss_energy_floor: 0.02   # BCE ignores T-F bins below this fraction of per-sample peak magnitude
  clip_grad: 5.0

video:
  fps: 8
  num_frames: 48            # 6s * 8fps
  frame_size: 224
  body_joints: 18           # OpenPose COCO body
  hand_joints: 21           # per hand
  num_people_max: 2
  pose_augment: false       # random keypoint jitter on the train split (paper)
  pose_jitter_translate: 0.05
  pose_jitter_scale: 0.1
  pose_jitter_rotate_deg: 10.0

model:
  audio:
    ngf: 64
    num_downs: 7
    input_nc: 1
    output_nc: 1
    conv_kernel: 4          # encoder conv kernel (paper = 3)
    up_kernel: 4            # decoder transposed-conv kernel (paper = 3)
    dilation: 1             # documented knob only; paper text is contradictory
  context:
    backbone: resnet50
    pretrained: true
    feat_dim: 512           # paper keeps the raw 2048-d ResNet-50 feature
  pose:
    in_channels: 3          # (x, y, confidence)
    graph_layers: [64, 64, 64, 128, 128, 256]
    stride_layers: [2, 4]   # block indices that downsample in time
    temporal_kernel: 9
    dropout: 0.1
    embed_dim: 512
    context_mode: film      # {film, concat} context conditioning (paper = concat)
  fusion:
    dim: 512
    depth: 3
    heads: 8
    mlp_ratio: 4.0
    dropout: 0.1
    mode: transformer       # {transformer, paper_attn} fusion scheme (paper = paper_attn)

train:
  batch_size: 16
  num_workers: 8
  epochs: 100
  lr: 0.001
  lr_backbone: 0.0001
  weight_decay: 0.0001
  lr_steps: [40, 80]
  lr_gamma: 0.1
  optimizer: adam           # {adam, sgd}; sgd = paper (momentum 0.9)
  momentum: 0.9
  param_groups:             # only used when optimizer == sgd
    audio_fusion: 0.01      # paper: 1e-2 for audio-separation U-Net + fusion
    gcn_appearance: 0.001   # paper: 1e-3 for ST-GCN + appearance (context) net
  log_interval: 20
  ckpt_interval: 1

eval:
  metrics: [sdr, sir, sar]
